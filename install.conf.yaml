- defaults:
    link:
      relink: true
      force: true

- clean: ['~']
- clean:
    ~/.config:
      recursive: true

- create:
    - ~/.config/alacritty

- link:
    ~/.zshrc: .zshrc
    ~/.tmux.conf: .tmux.conf
    ~/.gitconfig: .gitconfig
    ~/.gdbinit: .gdbinit
    ~/.config/alacritty/alacritty.toml: alacritty.toml
    ~/.config/nvim: nvim

- shell:
  - [git submodule update --init --recursive, Installing submodules]
